kind = "web"
previewPath = "/"
title = "Bingo Tire & Auto Service"
version = "1.0.0"
id = "artifacts/bingo-tires"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18628

[services.development]
run = "pnpm --filter @workspace/bingo-tires run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bingo-tires", "run", "build" ]
publicDir = "artifacts/bingo-tires/out"
serve = "static"

[services.env]
PORT = "18628"
BASE_PATH = "/"
